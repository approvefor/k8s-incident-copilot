# Legacy raw manifest kept for quick kubectl demos. Prefer deploy/helm/ai-platform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-copilot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-sre-copilot-api
  template:
    metadata:
      labels:
        app: ai-sre-copilot-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: ghcr.io/example/ai-sre-copilot-api:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
