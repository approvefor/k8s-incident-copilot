services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: devops_logs
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-logs}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-logs}"
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      API_URL: http://api:8000
      INTERVAL_SECONDS: 5
    depends_on:
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logs}
      POSTGRES_USER: ${POSTGRES_USER:-logs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logs} -d ${POSTGRES_DB:-logs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  qdrant-data:
  postgres-data:
  minio-data:
