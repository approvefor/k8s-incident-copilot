apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-platform.fullname" . }}-api
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "{{ .Values.api.port }}"
    spec:
      serviceAccountName: {{ include "ai-platform.fullname" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "ai-platform.image" (dict "registry" .Values.global.imageRegistry "image" .Values.api.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: K8S_RELEASE_FULLNAME
              value: {{ include "ai-platform.fullname" . | quote }}
            - name: QDRANT_URL
              value: {{ default (include "ai-platform.qdrantUrl" .) .Values.api.qdrantUrlOverride | quote }}
            - name: DATABASE_URL
              {{ if .Values.api.audit.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.audit.existingSecret | quote }}
                  key: {{ .Values.api.audit.databaseUrlSecretKey | quote }}
              {{ else }}
              value: {{ include "ai-platform.databaseUrl" . | quote }}
              {{ end }}
            {{ if .Values.api.openai.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.openai.existingSecret | quote }}
                  key: {{ .Values.api.openai.apiKeySecretKey | quote }}
            - name: EMBEDDING_PROVIDER
              value: "openai"
            {{ end }}
            {{ range $key, $value := .Values.api.env }}
            {{ if and (ne $key "QDRANT_URL") (not (and $.Values.api.openai.enabled (eq $key "EMBEDDING_PROVIDER"))) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{ end }}
            {{ end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
