apiVersion: v2
name: ai-platform
description: AI SRE Copilot production-style platform
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: postgresql
    version: 15.5.38
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 19.6.4
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: qdrant
    version: 1.12.1
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  - name: minio
    version: 14.8.5
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
