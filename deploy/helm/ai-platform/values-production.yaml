global:
  imageRegistry: ghcr.io
  imagePullPolicy: IfNotPresent

api:
  image:
    repository: your-org/ai-sre-copilot-api
    tag: sha-REPLACE_WITH_GIT_SHA
    digest: ""
  audit:
    existingSecret: ai-platform-secrets
    databaseUrlSecretKey: database-url
  openai:
    enabled: true
    existingSecret: ai-platform-secrets
    apiKeySecretKey: OPENAI_API_KEY
  env:
    QDRANT_COLLECTION: devops_logs_openai_1536
    OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-collector.observability:4317

worker:
  image:
    repository: your-org/ai-sre-copilot-worker
    tag: sha-REPLACE_WITH_GIT_SHA
    digest: ""

networkPolicy:
  enabled: true
  allowExternalHttps: true
  observabilityNamespace: observability
  otlpPort: 4317

postgresql:
  enabled: false

minio:
  auth:
    existingSecret: ai-platform-secrets
