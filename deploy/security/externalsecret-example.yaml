apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: ai-platform
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ai-platform"
          serviceAccountRef:
            name: ai-platform-ai-platform
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-platform-secrets
  namespace: ai-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ai-platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ai-platform/prod
        property: openai_api_key
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: ai-platform/prod
        property: postgres_password
    - secretKey: database-url
      remoteRef:
        key: ai-platform/prod
        property: database_url
    - secretKey: root-password
      remoteRef:
        key: ai-platform/prod
        property: minio_root_password
