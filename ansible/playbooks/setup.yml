---
- name: Bootstrap AI platform node
  hosts: web
  become: true
  gather_facts: true

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
        state: present
        update_cache: true

    - name: Install container runtime
      ansible.builtin.apt:
        name: containerd
        state: present

    - name: Enable containerd
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true

    - name: Download k3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/install-k3s.sh
        mode: "0755"

    - name: Install k3s
      ansible.builtin.command:
        cmd: /tmp/install-k3s.sh
        creates: /usr/local/bin/k3s

    - name: Wait for Kubernetes API
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_nodes
      retries: 10
      delay: 6
      until: k3s_nodes.rc == 0
      changed_when: false
