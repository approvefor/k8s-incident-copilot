name: DevOps CI

on:
  workflow_call:
  push:
  pull_request:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  API_IMAGE: ai-sre-copilot-api
  WORKER_IMAGE: ai-sre-copilot-worker

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: PYTHONPATH=. pytest -q

      - name: Run AI safety evals
        run: PYTHONPATH=. python scripts/run-evals.py

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -f api/Dockerfile -t $REGISTRY/${{ github.repository_owner }}/$API_IMAGE:${{ github.sha }} .

      - name: Build worker image
        run: docker build -f worker/Dockerfile -t $REGISTRY/${{ github.repository_owner }}/$WORKER_IMAGE:${{ github.sha }} .

      - name: Push API image
        if: github.event_name == 'push'
        run: docker push $REGISTRY/${{ github.repository_owner }}/$API_IMAGE:${{ github.sha }}

      - name: Push worker image
        if: github.event_name == 'push'
        run: docker push $REGISTRY/${{ github.repository_owner }}/$WORKER_IMAGE:${{ github.sha }}

  supply-chain:
    name: SBOM and Image Signing
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: api-sbom.spdx.json

      - name: Generate worker SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: worker-sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            api-sbom.spdx.json
            worker-sbom.spdx.json

      - name: Scan API SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: api-sbom.spdx.json
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan worker SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: worker-sbom.spdx.json
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign API image
        run: cosign sign --yes $REGISTRY/${{ github.repository_owner }}/$API_IMAGE:${{ github.sha }}

      - name: Sign worker image
        run: cosign sign --yes $REGISTRY/${{ github.repository_owner }}/$WORKER_IMAGE:${{ github.sha }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  infrastructure:
    name: IaC Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=terraform/aws fmt -check

      - name: Terraform init
        run: terraform -chdir=terraform/aws init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/aws validate

      - name: Install Ansible lint
        run: pipx install ansible-lint

      - name: Lint Ansible
        run: ansible-lint ansible/playbooks/setup.yml

  helm:
    name: Helm Validate
    runs-on: ubuntu-latest
    needs: [test, infrastructure]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Helm dependency update
        run: helm dependency update deploy/helm/ai-platform

      - name: Helm lint
        run: helm lint deploy/helm/ai-platform

      - name: Helm lint production values
        run: helm lint deploy/helm/ai-platform -f deploy/helm/ai-platform/values-production.yaml

      - name: Render manifests
        run: helm template ai-platform deploy/helm/ai-platform > rendered.yaml

      - name: Render production manifests
        run: helm template ai-platform deploy/helm/ai-platform -f deploy/helm/ai-platform/values-production.yaml > rendered-production.yaml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, supply-chain, security, helm]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_PRODUCTION_DEPLOY == 'true'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Helm
        run: |
          helm dependency update deploy/helm/ai-platform
          helm upgrade --install ai-platform deploy/helm/ai-platform \
            --namespace ai-platform \
            --create-namespace \
            --set api.image.repository=${{ github.repository_owner }}/$API_IMAGE \
            --set api.image.tag=${{ github.sha }} \
            --set worker.image.repository=${{ github.repository_owner }}/$WORKER_IMAGE \
            --set worker.image.tag=${{ github.sha }}
